  /* ============ Sprache (DE / AR + RTL) ============ */
  var lang = 'ar';
  var root = document.getElementById('root');
  function getPath(obj, path) {
    return path.split('.').reduce(function (o, k) { return o == null ? undefined : o[k]; }, obj);
  }
  function setLang(l) {
    lang = l;
    var t = copy[l], isAr = l === 'ar';
    root.setAttribute('dir', isAr ? 'rtl' : 'ltr');
    document.documentElement.lang = l;
    document.documentElement.dir = isAr ? 'rtl' : 'ltr';
    root.style.setProperty('--fd', isAr ? "'Amiri', serif" : "'Cormorant Garamond', serif");
    root.style.setProperty('--fb', isAr ? "'Cairo', sans-serif" : "'Jost', sans-serif");
    var nodes = document.querySelectorAll('[data-i18n]');
    for (var i = 0; i < nodes.length; i++) {
      var v = getPath(t, nodes[i].getAttribute('data-i18n'));
      if (v != null) nodes[i].textContent = v;
    }
    var phs = document.querySelectorAll('[data-i18n-ph]');
    for (var j = 0; j < phs.length; j++) {
      var pv = getPath(t, phs[j].getAttribute('data-i18n-ph'));
      if (pv != null) phs[j].setAttribute('placeholder', pv);
    }
  }
  /* einsprachig (Arabisch) – kein Umschalter */

  /* ============ Eröffnungs-Siegel ============ */
  var intro = document.getElementById('intro');
  var opened = false;
  function openInvite() {
    if (opened) return; opened = true;
    intro.classList.add('intro--opening');
    setTimeout(function () { intro.style.display = 'none'; }, 1150);
  }
  intro.addEventListener('click', openInvite);
  intro.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openInvite(); }
  });

  /* ============ Countdown (Zieldatum: 19. Juli 2026, 20:00 Uhr, Tunesien UTC+1) ============ */
  var target = new Date('2026-07-19T20:00:00+01:00').getTime();
  function pad(n) { return String(n).padStart(2, '0'); }
  function setTxt(id, v) { var el = document.getElementById(id); if (el) el.textContent = v; }
  function tick() {
    var diff = Math.max(0, target - Date.now());
    var d = Math.floor(diff / 86400000); diff -= d * 86400000;
    var h = Math.floor(diff / 3600000); diff -= h * 3600000;
    var m = Math.floor(diff / 60000); diff -= m * 60000;
    var s = Math.floor(diff / 1000);
    setTxt('cd-d', String(d)); setTxt('cd-h', pad(h)); setTxt('cd-m', pad(m)); setTxt('cd-s', pad(s));
  }
  tick();
  setInterval(tick, 1000);

  /* ============ Fallende Blüten + Scroll-Bewegung ============ */
  (function () {
    var layer = document.getElementById('particles');
    if (!layer) return;
    var names = ['fallA', 'fallB', 'fallC'];
    var frag = document.createDocumentFragment();
    var items = [];
    for (var i = 0; i < 12; i++) {
      // eines der 6 Blütenblätter aus dem Sprite (3 Spalten × 2 Reihen) auswählen
      var size = +(14 + Math.random() * 20).toFixed(1);
      var cx = Math.floor(Math.random() * 3) * 50;   // 0 / 50 / 100 %
      var cy = Math.floor(Math.random() * 2) * 100;  // 0 / 100 %
      var op = +(0.3 + Math.random() * 0.35).toFixed(2);

      // außen: Scroll-Bewegung — innen: die fallende Animation (CSS)
      var wrap = document.createElement('div');
      wrap.style.cssText =
        'position:absolute;top:-12vh;left:' + (+(Math.random() * 100).toFixed(2)) + '%;' +
        'width:' + size + 'px;height:' + size + 'px;will-change:transform';
      var leaf = document.createElement('div');
      leaf.style.cssText =
        'width:100%;height:100%;opacity:' + op + ';' +
        'background:url(img/Blueten.png) ' + cx + '% ' + cy + '%/300% 200% no-repeat;' +
        'animation:' + names[i % 3] + ' ' + (+(13 + Math.random() * 14).toFixed(1)) + 's linear ' + (+(Math.random() * 16).toFixed(2)) + 's infinite';
      wrap.appendChild(leaf);
      frag.appendChild(wrap);

      items.push({
        el: wrap,
        depth: +((0.03 + Math.random() * 0.12) * (Math.random() < 0.5 ? -1 : 1)).toFixed(3), // Parallax-Tiefe (hoch/runter)
        amp: +(8 + Math.random() * 16).toFixed(1),     // seitliches Wiegen (Wind)
        freq: +(0.002 + Math.random() * 0.004).toFixed(4),
        phase: +(Math.random() * 6.283).toFixed(3)
      });
    }
    layer.appendChild(frag);

    var raf = null;
    function update() {
      raf = null;
      var y = window.scrollY || window.pageYOffset || 0;
      for (var j = 0; j < items.length; j++) {
        var it = items[j];
        var ty = y * it.depth;                                  // unterschiedlich schnell beim Scrollen
        var tx = it.amp * Math.sin(y * it.freq + it.phase);     // sanftes seitliches Driften
        it.el.style.transform = 'translate3d(' + tx.toFixed(1) + 'px,' + ty.toFixed(1) + 'px,0)';
      }
    }
    window.addEventListener('scroll', function () {
      if (!raf) raf = requestAnimationFrame(update);
    }, { passive: true });
    update();
  })();

  /* ============ Scroll-Hinweis: klickbar -> sanft zur nächsten Sektion ============ */
  (function () {
    var cue = document.getElementById('scroll-cue');
    if (!cue) return;
    cue.addEventListener('click', function () {
      var hero = cue.closest('section');
      var next = hero && hero.nextElementSibling;
      if (next && next.scrollIntoView) {
        next.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        window.scrollBy({ top: Math.round(window.innerHeight * 0.85), behavior: 'smooth' });
      }
    });
  })();

  /* ============ Start ============ */
  setLang('ar');
})();
</script>
