<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut Generator</title>
</head>
<body>
<style>
body { font-family:Arial, sans-serif; background-color:#e689e6; color:#333; padding:20px; }
.donut-builder { display:flex; gap:40px; align-items:flex-start; max-width:1000px; margin:0 auto; }
.donut-options { width:40%; }
.donut-options h3 { margin-bottom:10px; }
.donut-options button { display:block; margin-bottom:8px; padding:10px; width:100%; cursor:pointer; }
.donut-preview { width:100%; height:100%; position:relative; }
.donut-preview img { position:absolute; top:19%; left:16%; width:67%; display:none; height: auto ;}
button { background-color:#e2a3f2; border: #aa7676; border-radius:5px; color:#fff; font-weight: 900; }
button:hover { background-color:#d992e2; }
.donut-platzierung { position: relative; width: 480px; height: 426.66px; }
</style>

<div class="donut-builder">
  <div class="donut-options">
    <h3>Teig</h3>
    <button data-select-base="base1">Base 1</button>
    <button data-select-base="base2">Base 2</button>
    <button data-select-base="base3">Base 3</button>

    <h3>Glasur</h3>
    <button data-select-glaze="glaze1">Glaze 1</button>
    <button data-select-glaze="glaze2">Glaze 2</button>
    <button data-select-glaze="glaze3">Glaze 3</button>
    <button data-select-glaze="glaze4">Glaze 4</button>

    <h3>Topping</h3>
    <button data-select-topping="topping1">Topping 1</button>
    <button data-select-topping="topping2">Topping 2</button>
    <button data-select-topping="topping3">Topping 3</button>
  </div>
    
  <div class="donut-preview">
    <!-- Base -->
     <div class="donut-platzierung">
        <img src="Bilder/Backgroundl.svg" width="480"height="480" style="display: block; width: 100%; left: 0; top: 0;">
    <img src="Bilder/Normale Basis.svg" width="480"height="480" class="base" data-base="base1">
    <img src="Bilder/Schoko Basis.svg" width="480"height="480"class="base" data-base="base2">
    <img src="Bilder/Red Velvet Basis.svg" width="480"height="480"class="base" data-base="base3">

    <!-- Glaze -->
    <img src="Bilder/Erdbeer Glasur.svg" width="480"height="480" class="glaze" data-glaze="glaze1">
    <img src="Bilder/Schoko Glasur.svg" width="480"height="480" class="glaze" data-glaze="glaze2">
    <img src="Bilder/Apfel Glasur.svg" width="480"height="480" class="glaze" data-glaze="glaze3">
    <img src="Bilder/Zucker Glasur.png" width="480"height="480" class="glaze" data-glaze="glaze4">

    <!-- Topping -->
    <img src="Bilder/Streusel.svg" width="480"height="480" class="topping" data-topping="topping1">
    <img src="Bilder/Schoko Streusel.svg" width="480"height="480" class="topping" data-topping="topping2">
    <img src="Bilder/Zucker Streusel.svg" width="480"height="480" class="topping" data-topping="topping3">
     </div>
    
  </div>
</div>
</body>
</html>

<script>
function showOnly(selector, value, attr) {
  document.querySelectorAll(selector).forEach(el => {
    el.style.display = el.dataset[attr] === value ? 'block' : 'none';
  });
}

// Base
document.querySelectorAll('[data-select-base]').forEach(btn => {
  btn.addEventListener('click', () => {
    showOnly('.base', btn.dataset.selectBase, 'base');
  });
});

// Glaze
document.querySelectorAll('[data-select-glaze]').forEach(btn => {
  btn.addEventListener('click', () => {
    showOnly('.glaze', btn.dataset.selectGlaze, 'glaze');
  });
});

// Topping
document.querySelectorAll('[data-select-topping]').forEach(btn => {
  btn.addEventListener('click', () => {
    showOnly('.topping', btn.dataset.selectTopping, 'topping');
  });
});

// Default
showOnly('.base1','base2','base3');
showOnly('.glaze1','glaze2','glaze3');
showOnly('.topping1','topping2','topping3');
</script>
