name: Deploy to IONOS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          pip install paramiko --quiet
          python3 - << 'EOF'
          import paramiko, os

          host = os.environ['FTP_SERVER']
          user = os.environ['FTP_USERNAME']
          pwd  = os.environ['FTP_PASSWORD']

          REMOTE_ROOT = '/www'

          SKIP = {'.git', '.github', 'worker', 'README.md',
                  'ANALYTICS_SETUP.md', 'CNAME', '.ftp-deploy-sync-state.json'}

          t = paramiko.Transport((host, 22))
          t.connect(username=user, password=pwd)
          sftp = paramiko.SFTPClient.from_transport(t)

          def ensure_dir(path):
              try: sftp.mkdir(path)
              except: pass
              try: sftp.chmod(path, 0o755)
              except: pass

          def upload(local, remote):
              for name in os.listdir(local):
                  if name in SKIP or name.startswith('.'):
                      continue
                  lp = os.path.join(local, name)
                  rp = f"{remote}/{name}"
                  if os.path.isdir(lp):
                      ensure_dir(rp)
                      upload(lp, rp)
                  else:
                      print(f'→ {rp}')
                      sftp.put(lp, rp)
                      try: sftp.chmod(rp, 0o644)
                      except: pass

          ensure_dir(REMOTE_ROOT)
          upload('.', REMOTE_ROOT)
          sftp.close()
          t.close()
          print('Done!')
          EOF
